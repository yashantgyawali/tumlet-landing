[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache hashed assets forever (filenames include a content hash from Vite)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache HTML at the CDN edge for 1 week; browsers always revalidate
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=604800, stale-while-revalidate=86400"